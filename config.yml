    - AGG
    - QQQ
  # Macro regime proxies (all downloadable via yfinance)
  macro_proxies:
    - SPY    # Growth proxy (US equity)
    - QQQ    # Growth / tech
    - TLT    # Long-duration bonds
    - IEF    # Medium-duration bonds
    - SHY    # Short-duration / cash
    - GLD    # Gold (safe haven + inflation)
    - TIP    # TIPS (inflation-protected bonds)
    - HYG    # High yield (credit / risk appetite)
